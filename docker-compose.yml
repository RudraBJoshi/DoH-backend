services:
  web:
    image: flask_open
    build: .
    env_file:
      - .env
    ports:
      - "8424:8424"
    volumes:
      # Persists the SQLite database and uploads between container restarts
      - ./instance:/app/instance
    restart: unless-stopped
    depends_on:
      - socketio

  socketio:
    image: socket_open
    build: ./socket
    ports:
      - "8500:8500"
    restart: unless-stopped